name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag/sha/branch) to build"
        required: false
        default: ""

jobs:
  build-installers:
    name: Build launcher installers (${{ matrix.asset_suffix }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x86_64
            ext: ""
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_suffix: linux-aarch64
            ext: ""
          - runner: macos-14
            target: x86_64-apple-darwin
            asset_suffix: darwin-x86_64
            ext: ""
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_suffix: darwin-arm64
            ext: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-x86_64
            ext: exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build launcher
        shell: bash
        run: |
          cargo build --release --manifest-path launcher/Cargo.toml --target "${{ matrix.target }}"

      - name: Package installer (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [ -z "$TAG" ]; then TAG="dev"; fi
          if [ -n "${{ matrix.ext }}" ]; then
            OUT="JanusX-${TAG}-${{ matrix.asset_suffix }}.${{ matrix.ext }}"
          else
            OUT="JanusX-${TAG}-${{ matrix.asset_suffix }}"
          fi
          cp "launcher/target/${{ matrix.target }}/release/jx" "$OUT"
          chmod +x "$OUT"
          echo "PACKAGED_FILE=$OUT" >> "$GITHUB_ENV"

      - name: Package installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "dev" }
          $out = "JanusX-$tag-${{ matrix.asset_suffix }}.${{ matrix.ext }}"
          Copy-Item "launcher/target/${{ matrix.target }}/release/jx.exe" $out
          "PACKAGED_FILE=$out" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.asset_suffix }}
          path: ${{ env.PACKAGED_FILE }}

  build-darwin-universal:
    name: Build darwin universal installer
    runs-on: macos-latest
    needs:
      - build-installers
    steps:
      - name: Download darwin x86_64 installer
        uses: actions/download-artifact@v4
        with:
          name: installer-darwin-x86_64
          path: dist-installer-x86

      - name: Download darwin arm64 installer
        uses: actions/download-artifact@v4
        with:
          name: installer-darwin-arm64
          path: dist-installer-arm

      - name: Create universal installer
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [ -z "$TAG" ]; then TAG="dev"; fi
          X86_FILE=$(ls dist-installer-x86/JanusX-*darwin-x86_64 | head -n 1)
          ARM_FILE=$(ls dist-installer-arm/JanusX-*darwin-arm64 | head -n 1)
          OUT="JanusX-${TAG}-darwin-universal"
          lipo -create "$X86_FILE" "$ARM_FILE" -output "$OUT"
          chmod +x "$OUT"
          echo "PACKAGED_FILE=$OUT" >> "$GITHUB_ENV"

      - name: Upload universal installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-darwin-universal
          path: ${{ env.PACKAGED_FILE }}

  build-wheels:
    name: Build wheels (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Sync version from tag
        shell: bash
        run: |
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          if [[ "$REF" == refs/tags/* ]]; then
            REF="${REF#refs/tags/}"
          fi
          if [[ ! "$REF" =~ ^v ]]; then
            echo "Skip sync_version_from_tag.py (non-tag ref: $REF)"
            exit 0
          fi
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          $PY scripts/sync_version_from_tag.py "$REF"

      - name: Set up Python
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        if: runner.os != 'Linux'
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        if: runner.os != 'Linux'
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin==1.9.4

      - name: Set Python tag (Linux)
        if: runner.os == 'Linux'
        run: echo "PY_TAG=${PYTHON_VERSION/./}" >> $GITHUB_ENV
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter /opt/python/cp${{ env.PY_TAG }}-cp${{ env.PY_TAG }}/bin/python
          manylinux: ${{ (matrix.python-version == '3.13' || matrix.python-version == '3.14') && '2_28' || '2014' }}
          python-version: ${{ matrix.python-version }}

      - name: Build wheels (macOS/Windows)
        if: runner.os != 'Linux'
        run: |
          maturin build --release --out dist --interpreter python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Sync version from tag
        shell: bash
        run: |
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          if [[ "$REF" == refs/tags/* ]]; then
            REF="${REF#refs/tags/}"
          fi
          if [[ ! "$REF" =~ ^v ]]; then
            echo "Skip sync_version_from_tag.py (non-tag ref: $REF)"
            exit 0
          fi
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          $PY scripts/sync_version_from_tag.py "$REF"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin==1.9.4

      - name: Build sdist
        run: |
          maturin sdist --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build-wheels
      - build-sdist
    permissions:
      contents: read
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin==1.9.4

      - name: Publish to PyPI
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          maturin upload --non-interactive --skip-existing dist/*.whl dist/*.tar.gz

  publish-installers:
    name: Publish launcher installers to GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-installers
      - build-darwin-universal
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-installers
          merge-multiple: true

      - name: Upload installers to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-installers/JanusX-*

  sync-version-back-to-repo:
    name: Sync Version Back To Repo
    runs-on: ubuntu-latest
    needs:
      - publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Sync version and build date from tag
        shell: bash
        run: |
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          $PY scripts/sync_version_from_tag.py "${GITHUB_REF_NAME}"

      - name: Commit and push changes
        shell: bash
        run: |
          if git diff --quiet -- pyproject.toml Cargo.toml python/janusx/script/JanusX.py; then
            echo "No version/build-date changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml Cargo.toml python/janusx/script/JanusX.py
          git commit -m "chore(release): sync version from ${GITHUB_REF_NAME}"
          git pull --rebase origin "${{ github.event.repository.default_branch }}"
          git push origin HEAD:"${{ github.event.repository.default_branch }}"
