name: Update Bioconda PR (Manual)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag or version (e.g. v1.0.23 or 1.0.23)"
        required: true
        default: ""
      source_ref:
        description: "JanusX ref to checkout for recipe template (defaults to repository default branch)"
        required: false
        default: ""
      bioconda_fork:
        description: "Fork repo used to open/update PR (owner/repo)"
        required: false
        default: "FJingxian/bioconda-recipes"
  workflow_call:
    inputs:
      release_tag:
        type: string
        required: true
      source_ref:
        type: string
        required: false
        default: ""
      bioconda_fork:
        type: string
        required: false
        default: "FJingxian/bioconda-recipes"
    secrets:
      BIOCONDA_PAT:
        required: false

jobs:
  update-bioconda-pr:
    name: Update Bioconda PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BIOCONDA_PAT: ${{ secrets.BIOCONDA_PAT }}
    steps:
      - name: Resolve source ref
        id: source_ref
        shell: bash
        run: |
          REF="${{ inputs.source_ref }}"
          if [[ -z "$REF" ]]; then
            REF="${{ github.event.repository.default_branch }}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.source_ref.outputs.ref }}

      - name: Check Bioconda token
        id: bioconda_gate
        shell: bash
        run: |
          if [[ -z "${BIOCONDA_PAT:-}" ]]; then
            echo "::warning::BIOCONDA_PAT secret is not set. Skipping Bioconda PR update."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release version
        if: ${{ steps.bioconda_gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          RAW="${{ inputs.release_tag }}"
          TAG="${RAW#refs/tags/}"
          if [[ "$TAG" =~ ^v ]]; then
            VERSION="${TAG#v}"
          elif [[ "$TAG" =~ ^[0-9]+(\.[0-9]+){1,3}([.-][A-Za-z0-9]+)*$ ]]; then
            VERSION="$TAG"
          else
            echo "Invalid release_tag: '$RAW' (expected vX.Y.Z or X.Y.Z)"
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BIOCONDA_BRANCH=update-janusx-v${VERSION}" >> "$GITHUB_ENV"
          echo "BIOCONDA_FORK=${{ inputs.bioconda_fork }}" >> "$GITHUB_ENV"

      - name: Wait for PyPI sdist
        if: ${{ steps.bioconda_gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          python - <<'PY'
          import os, time, urllib.request, sys
          version = os.environ["VERSION"]
          url = f"https://files.pythonhosted.org/packages/source/j/janusx/janusx-{version}.tar.gz"
          for _ in range(40):
              try:
                  with urllib.request.urlopen(url, timeout=20) as r:
                      if r.status == 200:
                          print("Found:", url)
                          sys.exit(0)
              except Exception:
                  pass
              time.sleep(15)
          raise SystemExit("PyPI sdist not available yet")
          PY

      - name: Checkout bioconda fork
        if: ${{ steps.bioconda_gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          rm -rf bioconda-fork
          git clone "https://x-access-token:${BIOCONDA_PAT}@github.com/${BIOCONDA_FORK}.git" bioconda-fork
          cd bioconda-fork
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/bioconda/bioconda-recipes.git
          git fetch upstream --depth=1 || true
          if git show-ref --verify --quiet refs/remotes/upstream/master; then
            BASE_REF="upstream/master"
          elif git show-ref --verify --quiet refs/remotes/upstream/main; then
            BASE_REF="upstream/main"
          elif git show-ref --verify --quiet refs/remotes/origin/master; then
            BASE_REF="origin/master"
          elif git show-ref --verify --quiet refs/remotes/origin/main; then
            BASE_REF="origin/main"
          else
            BASE_REF=""
          fi
          if [[ -n "$BASE_REF" ]]; then
            git checkout -B "${BIOCONDA_BRANCH}" "$BASE_REF"
          else
            git checkout -B "${BIOCONDA_BRANCH}"
          fi

      - name: Update recipe
        if: ${{ steps.bioconda_gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import os
          import re
          import shutil
          import urllib.request
          from pathlib import Path

          version = os.environ["VERSION"]
          path = Path("bioconda-fork/recipes/janusx/meta.yaml")
          template = Path("bioconda-recipes/recipes/janusx/meta.yaml")
          if not path.exists():
              if template.exists():
                  path.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(template, path)
                  print(f"Recipe missing in fork; created from template: {path}")
              else:
                  path.parent.mkdir(parents=True, exist_ok=True)
                  default_recipe = (
                      '{% set version = "' + version + '" %}\n'
                      "\n"
                      "package:\n"
                      "  name: janusx\n"
                      "  version: {{ version }}\n"
                      "\n"
                      "source:\n"
                      "  url: https://files.pythonhosted.org/packages/source/j/janusx/janusx-{{ version }}.tar.gz\n"
                      f"  sha256: {sha}\n"
                      "\n"
                      "build:\n"
                      "  number: 0\n"
                      "  script: {{ PYTHON }} -m pip install . --no-deps -vv\n"
                      "\n"
                      "requirements:\n"
                      "  host:\n"
                      "    - python\n"
                      "    - pip\n"
                      "    - maturin >=1.7,<2\n"
                      "    - numpy >=1.23\n"
                      "    - pybind11 >=2.13\n"
                      "  run:\n"
                      "    - python\n"
                      "    - numpy\n"
                      "    - scipy\n"
                      "    - pandas >=1.5\n"
                      "    - matplotlib\n"
                      "    - psutil\n"
                      "    - rich\n"
                      "    - tqdm\n"
                      "    - joblib >=1.5\n"
                      "    - threadpoolctl\n"
                      "\n"
                      "test:\n"
                      "  commands:\n"
                      "    - jx --version\n"
                      "\n"
                      "about:\n"
                      "  home: https://github.com/FJingxian/JanusX\n"
                      "  license: GPL-3.0-or-later\n"
                      "  summary: A Suite of Genotyping Tools for GWAS and GS\n"
                      "\n"
                      "extra:\n"
                      "  recipe-maintainers:\n"
                      "    - FJingxian\n"
                  )
                  path.write_text(default_recipe, encoding="utf-8")
                  print(f"Recipe missing in fork and source template; created default: {path}")

          text = path.read_text(encoding="utf-8")

          text, n_ver = re.subn(
              r'(?m)^\s*\{%\s*set\s+version\s*=\s*"[^"]+"\s*%\}\s*$',
              f'{{% set version = "{version}" %}}',
              text,
              count=1,
          )
          if n_ver != 1:
              raise SystemExit("Failed to update recipe version line.")

          text, n_url = re.subn(
              r'(?m)^(\s*url:\s*).*$',
              r"\g<1>https://files.pythonhosted.org/packages/source/j/janusx/janusx-{{ version }}.tar.gz",
              text,
              count=1,
          )
          if n_url != 1:
              raise SystemExit("Failed to update recipe source url.")

          source_url = f"https://files.pythonhosted.org/packages/source/j/janusx/janusx-{version}.tar.gz"

          data = urllib.request.urlopen(source_url, timeout=120).read()
          sha = hashlib.sha256(data).hexdigest()
          md5 = hashlib.md5(data).hexdigest()

          text, n_sha = re.subn(
              r'(?m)^(\s*sha256:\s*)[0-9a-fA-F]{32,}\s*$',
              rf"\g<1>{sha}",
              text,
              count=1,
          )
          if n_sha != 1:
              raise SystemExit("Failed to update recipe sha256.")

          text, _ = re.subn(
              r'(?m)^(\s*md5:\s*)[0-9a-fA-F]{32,}\s*$',
              rf"\g<1>{md5}",
              text,
              count=1,
          )

          path.write_text(text, encoding="utf-8")
          print(f"Updated {path} to version={version}, url={source_url}, sha256={sha}")
          PY

      - name: Commit and push
        id: commit_recipe
        if: ${{ steps.bioconda_gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          cd bioconda-fork
          git add recipes/janusx/meta.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Update janusx to ${VERSION}"
          git push origin "${BIOCONDA_BRANCH}" --force-with-lease
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: ${{ steps.bioconda_gate.outputs.enabled == 'true' && steps.commit_recipe.outputs.changed == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.BIOCONDA_PAT }}
        run: |
          OWNER="${BIOCONDA_FORK%%/*}"
          pr="$(gh pr list \
            --repo bioconda/bioconda-recipes \
            --search "is:open head:${OWNER}:${BIOCONDA_BRANCH}" \
            --state open \
            --json number \
            -q '.[0].number')"

          if [[ -z "${pr}" ]]; then
            set +e
            create_out="$(
              gh pr create \
                --repo bioconda/bioconda-recipes \
                --head "${OWNER}:${BIOCONDA_BRANCH}" \
                --base master \
                --title "Update janusx to ${VERSION}" \
                --body "Automated update from JanusX Bioconda workflow." 2>&1
            )"
            rc=$?
            set -e

            if [[ $rc -ne 0 ]]; then
              if echo "$create_out" | grep -qi "already exists"; then
                echo "[INFO] PR already exists; resolving existing PR number."
                pr="$(gh pr list \
                  --repo bioconda/bioconda-recipes \
                  --search "is:open head:${OWNER}:${BIOCONDA_BRANCH}" \
                  --state open \
                  --json number \
                  -q '.[0].number')"
                [[ -n "${pr}" ]] || {
                  echo "[WARN] Existing PR detected but number lookup failed."
                  echo "$create_out"
                  exit 0
                }
              else
                echo "$create_out"
                exit $rc
              fi
            else
              echo "$create_out"
              pr="$(printf '%s\n' "$create_out" | sed -n 's#.*/pull/\([0-9][0-9]*\).*#\1#p' | tail -n1)"
            fi
          fi

          if [[ -n "${pr}" ]]; then
            gh pr comment \
              --repo bioconda/bioconda-recipes \
              --body "@BiocondaBot please add label" \
              "${pr}" || true
            gh pr comment \
              --repo bioconda/bioconda-recipes \
              --body "Updated janusx to ${VERSION} via automated Bioconda workflow." \
              "${pr}" || true
          fi
