{% set name = "janusx" %}
{% set version = "1.0.15" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ../../../

build:
  number: 0
  skip: true  # [py<39]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.7,<2
  run:
    - python
    - numpy
    - scipy
    - pandas <3.0
    - matplotlib-base
    - psutil
    - rich
    - tqdm
    - rich-argparse
    - joblib >=1.5

outputs:
  - name: janusx-ml
    build:
      number: 0
      noarch: generic
    requirements:
      run:
        - janusx =={{ version }}
        - scikit-learn
        - xgboost
    about:
      summary: Optional ML dependencies for JanusX (scikit-learn, xgboost)

  - name: janusx-stats
    build:
      number: 0
      noarch: generic
    requirements:
      run:
        - janusx =={{ version }}
        - statsmodels
    about:
      summary: Optional statistical post-analysis dependency for JanusX (statsmodels)

  - name: janusx-sparse
    build:
      number: 0
      noarch: generic
      skip: true  # [not (linux and x86_64)]
    requirements:
      run:
        - janusx =={{ version }}
        - mkl
        - pypardiso
    about:
      summary: Optional sparse linear solver dependencies for JanusX (mkl, pypardiso)

  - name: janusx-full
    build:
      number: 0
      noarch: generic
    requirements:
      run:
        - janusx =={{ version }}
        - scikit-learn
        - xgboost
        - statsmodels
        - mkl  # [linux and x86_64]
        - pypardiso  # [linux and x86_64]
    about:
      summary: Full optional dependency bundle for JanusX

test:
  requires:
    - python
  commands:
    - jxpy -h
    - python -c "import janusx.janusx"
    - python -c "import janusx.script.JanusX as jx; assert callable(jx.main)"

about:
  home: https://github.com/FJingxian/JanusX
  summary: GWAS and genomic selection toolkit with Rust-accelerated kernels
  description: |
    JanusX is a high-performance toolkit for genome-wide association studies
    (GWAS), genomic selection (GS), and post-analysis visualization.

    This Bioconda recipe packages the Python+Rust core and provides the `jxpy`
    command entrypoint. Launcher-specific features (`jx`, self-update/runtime
    management, `fastq2vcf`, and `fastq2count`) are intentionally excluded
    from this package scope.

    Optional dependency bundles are provided as separate subpackages:
      - janusx-ml      (scikit-learn, xgboost)
      - janusx-stats   (statsmodels)
      - janusx-sparse  (mkl, pypardiso; linux x86_64)
      - janusx-full    (all optional bundles)

    Note:
      - The Python package `dynamicTreeCut` currently has no conda package in
        conda-forge/bioconda. For WGCNA module clustering support, install it
        with pip in the same environment.
  license: AGPL-3.0-or-later
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  doc_url: https://github.com/FJingxian/JanusX/tree/v{{ version }}/doc
  dev_url: https://github.com/FJingxian/JanusX

extra:
  identifiers:
    - doi:10.64898/2026.01.20.700366
  recipe-maintainers:
    - FJingxian
