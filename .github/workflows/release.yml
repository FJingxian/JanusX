name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag/sha/branch) to build from"
        required: false
        default: ""
      release_tag:
        description: "GitHub Release tag to upload installers (e.g. v1.0.13)"
        required: false
        default: ""
      installers_only:
        description: "Only rebuild/upload release installers (skip wheels/sdist/PyPI)"
        required: false
        default: "false"
      publish_pypi:
        description: "Publish to official PyPI (requires PYPI_API_TOKEN); skips TestPyPI in this run"
        required: false
        default: "false"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-installers:
    name: Build launcher installers (${{ matrix.asset_suffix }})
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_pypi != 'true' || github.event.inputs.installers_only == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
            zig_target: x86_64-unknown-linux-gnu.2.17
            use_zigbuild: true
            asset_suffix: linux-x86_64
            ext: ""
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            rust_targets: aarch64-unknown-linux-gnu
            zig_target: aarch64-unknown-linux-gnu.2.17
            use_zigbuild: true
            asset_suffix: linux-aarch64
            ext: ""
          - runner: macos-14
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            use_zigbuild: false
            asset_suffix: darwin-universal
            ext: ""
          - runner: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            use_zigbuild: false
            asset_suffix: windows-x86_64
            ext: exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Sync version from tag
        shell: bash
        run: |
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          if [[ "$REF" == refs/tags/* ]]; then
            REF="${REF#refs/tags/}"
          fi
          if [[ ! "$REF" =~ ^v ]]; then
            echo "Skip sync_version_from_tag.py (non-tag ref: $REF)"
            exit 0
          fi
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          $PY scripts/sync_version_from_tag.py "$REF"

      - name: Set up Zig (Linux compatibility build)
        if: ${{ matrix.use_zigbuild }}
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION=0.14.0
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu) ZIG_ARCH=x86_64 ;;
            aarch64-unknown-linux-gnu) ZIG_ARCH=aarch64 ;;
            *)
              echo "Unsupported Zig install target: ${{ matrix.target }}"
              exit 1
              ;;
          esac
          ZIG_BASENAME="zig-linux-${ZIG_ARCH}-${ZIG_VERSION}"
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/${ZIG_BASENAME}.tar.xz"
          ZIG_ROOT="${RUNNER_TEMP}/${ZIG_BASENAME}"
          rm -rf "${ZIG_ROOT}"
          curl --retry 5 --retry-connrefused --location --silent --show-error --fail \
            "${ZIG_URL}" -o "${RUNNER_TEMP}/${ZIG_BASENAME}.tar.xz"
          mkdir -p "${ZIG_ROOT}"
          tar -xJf "${RUNNER_TEMP}/${ZIG_BASENAME}.tar.xz" -C "${ZIG_ROOT}" --strip-components=1
          echo "${ZIG_ROOT}" >> "${GITHUB_PATH}"
          "${ZIG_ROOT}/zig" version

      - name: Install cargo-zigbuild
        if: ${{ matrix.use_zigbuild }}
        shell: bash
        run: |
          cargo install cargo-zigbuild --locked

      - name: Build launcher
        shell: bash
        run: |
          if [[ "${{ matrix.use_zigbuild }}" == "true" ]]; then
            cargo zigbuild --release --manifest-path launcher/Cargo.toml --target "${{ matrix.zig_target }}"
          elif [[ "${{ matrix.asset_suffix }}" == "darwin-universal" ]]; then
            cargo build --release --manifest-path launcher/Cargo.toml --target aarch64-apple-darwin
            cargo build --release --manifest-path launcher/Cargo.toml --target x86_64-apple-darwin
            mkdir -p launcher/target/universal-apple-darwin/release
            lipo -create \
              launcher/target/aarch64-apple-darwin/release/jx \
              launcher/target/x86_64-apple-darwin/release/jx \
              -output launcher/target/universal-apple-darwin/release/jx
          else
            cargo build --release --manifest-path launcher/Cargo.toml --target "${{ matrix.target }}"
          fi

      - name: Windows launcher smoke test (-upgrade latest + -uninstall -yes)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/ci/windows_launcher_smoke.ps1 `
            -LauncherPath "launcher/target/${{ matrix.target }}/release/jx.exe" `
            -WorkspaceRoot "$env:RUNNER_TEMP\jx-launcher-smoke"

      - name: Package installer (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BUILD_TARGET="${{ matrix.target }}"
          if [[ "${{ matrix.use_zigbuild }}" == "true" ]]; then
            BUILD_TARGET="${{ matrix.zig_target }}"
          fi
          TAG="${{ github.event.inputs.release_tag || github.event.inputs.ref || github.ref_name }}"
          TAG="${TAG#refs/tags/}"
          if [ -z "$TAG" ]; then TAG="dev"; fi
          if [ -n "${{ matrix.ext }}" ]; then
            OUT="JanusX-${TAG}-${{ matrix.asset_suffix }}.${{ matrix.ext }}"
          else
            OUT="JanusX-${TAG}-${{ matrix.asset_suffix }}"
          fi
          BIN_PATH=""
          for c in \
            "launcher/target/${BUILD_TARGET}/release/jx" \
            "launcher/target/${{ matrix.target }}/release/jx"
          do
            if [[ -f "$c" ]]; then
              BIN_PATH="$c"
              break
            fi
          done
          if [[ -z "$BIN_PATH" ]]; then
            BIN_PATH="$(find launcher/target -type f -path '*/release/jx' | head -n 1 || true)"
          fi
          if [[ -z "$BIN_PATH" || ! -f "$BIN_PATH" ]]; then
            echo "Cannot find built launcher binary under launcher/target."
            find launcher/target -maxdepth 3 -type d -print || true
            exit 1
          fi
          cp "$BIN_PATH" "$OUT"
          chmod +x "$OUT"
          FILES="$OUT"
          if [[ "${{ matrix.target }}" == *"unknown-linux-gnu" ]]; then
            WRAP="${OUT}.run"
            {
              printf '%s\n' '#!/usr/bin/env bash'
              printf '%s\n' 'set -euo pipefail'
              printf '%s\n' 'SELF="$0"'
              printf '%s\n' 'TMPDIR="$(mktemp -d "${TMPDIR:-/tmp}/janusx-installer.XXXXXX")"'
              printf '%s\n' 'cleanup() { rm -rf "$TMPDIR"; }'
              printf '%s\n' 'trap cleanup EXIT'
              printf '%s\n' "PAYLOAD_LINE=\"\$(awk '/^__JANUSX_PAYLOAD_BELOW__\$/ {print NR + 1; exit 0;}' \"\$SELF\")\""
              printf '%s\n' 'if [[ -z "${PAYLOAD_LINE:-}" ]]; then'
              printf '%s\n' '  echo "Installer payload missing."'
              printf '%s\n' '  exit 1'
              printf '%s\n' 'fi'
              printf '%s\n' 'BIN="$TMPDIR/JanusX-installer"'
              printf '%s\n' 'tail -n +"$PAYLOAD_LINE" "$SELF" > "$BIN"'
              printf '%s\n' 'chmod +x "$BIN"'
              printf '%s\n' 'exec "$BIN" "$@"'
              printf '%s\n' 'exit 0'
              printf '%s\n' '__JANUSX_PAYLOAD_BELOW__'
            } > "$WRAP"
            cat "$OUT" >> "$WRAP"
            chmod +x "$WRAP"
            FILES="$WRAP"
          elif [[ "${{ matrix.target }}" == *"apple-darwin" ]]; then
            WRAP="${OUT}.command"
            {
              printf '%s\n' '#!/usr/bin/env bash'
              printf '%s\n' 'set -euo pipefail'
              printf '%s\n' 'SELF="$0"'
              printf '%s\n' 'TMPDIR="$(mktemp -d "${TMPDIR:-/tmp}/janusx-installer.XXXXXX")"'
              printf '%s\n' 'cleanup() { rm -rf "$TMPDIR"; }'
              printf '%s\n' 'trap cleanup EXIT'
              printf '%s\n' "PAYLOAD_LINE=\"\$(awk '/^__JANUSX_PAYLOAD_BELOW__\$/ {print NR + 1; exit 0;}' \"\$SELF\")\""
              printf '%s\n' 'if [[ -z "${PAYLOAD_LINE:-}" ]]; then'
              printf '%s\n' '  echo "Installer payload missing."'
              printf '%s\n' '  exit 1'
              printf '%s\n' 'fi'
              printf '%s\n' 'BIN="$TMPDIR/JanusX-installer"'
              printf '%s\n' 'tail -n +"$PAYLOAD_LINE" "$SELF" > "$BIN"'
              printf '%s\n' 'chmod +x "$BIN"'
              printf '%s\n' 'exec "$BIN" "$@"'
              printf '%s\n' 'exit 0'
              printf '%s\n' '__JANUSX_PAYLOAD_BELOW__'
            } > "$WRAP"
            cat "$OUT" >> "$WRAP"
            chmod +x "$WRAP"
            FILES="$WRAP"
          fi
          {
            echo "PACKAGED_FILE<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Package installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag || github.event.inputs.ref || github.ref_name }}"
          if ($tag.StartsWith("refs/tags/")) { $tag = $tag.Substring(10) }
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "dev" }
          $out = "JanusX-$tag-${{ matrix.asset_suffix }}.${{ matrix.ext }}"
          Copy-Item "launcher/target/${{ matrix.target }}/release/jx.exe" $out
          "PACKAGED_FILE=$out" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Optional sign installer (Windows Authenticode)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WIN_SIGN_CERT_PFX_BASE64: ${{ secrets.WIN_SIGN_CERT_PFX_BASE64 }}
          WIN_SIGN_CERT_PASSWORD: ${{ secrets.WIN_SIGN_CERT_PASSWORD }}
          WIN_SIGN_TIMESTAMP_URL: ${{ secrets.WIN_SIGN_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_SIGN_CERT_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:WIN_SIGN_CERT_PASSWORD)) {
            Write-Host "Skipping Windows signing: missing WIN_SIGN_CERT_PFX_BASE64 / WIN_SIGN_CERT_PASSWORD."
            exit 0
          }

          $certPath = Join-Path $env:RUNNER_TEMP "janusx-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WIN_SIGN_CERT_PFX_BASE64))

          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\**\x64\signtool.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $signtool) { throw "signtool.exe not found on runner." }

          $timestamp = if ([string]::IsNullOrWhiteSpace($env:WIN_SIGN_TIMESTAMP_URL)) { "http://timestamp.digicert.com" } else { $env:WIN_SIGN_TIMESTAMP_URL }
          & $signtool sign /fd SHA256 /f $certPath /p $env:WIN_SIGN_CERT_PASSWORD /tr $timestamp /td SHA256 $env:PACKAGED_FILE
          if ($LASTEXITCODE -ne 0) { throw "signtool sign failed with exit code $LASTEXITCODE." }

          & $signtool verify /pa /v $env:PACKAGED_FILE
          if ($LASTEXITCODE -ne 0) { throw "signtool verify failed with exit code $LASTEXITCODE." }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.asset_suffix }}
          path: ${{ env.PACKAGED_FILE }}

  resolve-package-version:
    name: Resolve package version
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.installers_only != 'true' }}
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.resolve.outputs.package_version }}
      base_version: ${{ steps.resolve.outputs.base_version }}
      is_dev: ${{ steps.resolve.outputs.is_dev }}
    steps:
      - name: Resolve package version for TestPyPI/PyPI
        id: resolve
        shell: bash
        env:
          RAW_REF: ${{ github.event.inputs.ref || github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          PUBLISH_PYPI: ${{ github.event.inputs.publish_pypi }}
        run: |
          python - <<'PY'
          import os
          import re
          import urllib.error
          import urllib.request

          raw_ref = (os.environ.get("RAW_REF") or "").strip()
          event_name = (os.environ.get("EVENT_NAME") or "").strip()
          publish_pypi = (os.environ.get("PUBLISH_PYPI") or "").strip().lower() == "true"
          out = os.environ["GITHUB_OUTPUT"]

          ref = raw_ref
          if ref.startswith("refs/tags/"):
              ref = ref[len("refs/tags/") :]

          if not ref.startswith("v"):
              with open(out, "a", encoding="utf-8") as f:
                  f.write("base_version=\n")
                  f.write("package_version=\n")
                  f.write("is_dev=false\n")
              print(f"[version-resolve] non-tag ref, skip sync: {raw_ref!r}")
              raise SystemExit(0)

          base_version = ref[1:]
          if base_version == "":
              raise SystemExit(f"Invalid empty version from ref: {raw_ref!r}")
          if not re.fullmatch(r"[0-9A-Za-z][0-9A-Za-z.\-+]*", base_version):
              raise SystemExit(f"Unsupported version format from ref: {raw_ref!r}")

          use_dev_suffix = not (event_name == "workflow_dispatch" and publish_pypi)
          package_version = base_version
          is_dev = False

          if use_dev_suffix:
              def version_exists(ver: str) -> bool:
                  url = f"https://test.pypi.org/pypi/janusx/{ver}/json"
                  try:
                      with urllib.request.urlopen(url, timeout=20) as r:
                          return getattr(r, "status", 200) == 200
                  except urllib.error.HTTPError as exc:
                      if exc.code == 404:
                          return False
                      raise
                  except Exception:
                      raise

              try:
                  if version_exists(base_version):
                      next_dev = 1
                      while next_dev <= 9999 and version_exists(f"{base_version}.dev{next_dev}"):
                          next_dev += 1
                      package_version = f"{base_version}.dev{next_dev}"
                      is_dev = True
              except Exception as exc:
                  raise SystemExit(f"Failed to query TestPyPI version index: {exc}")

          with open(out, "a", encoding="utf-8") as f:
              f.write(f"base_version={base_version}\n")
              f.write(f"package_version={package_version}\n")
              f.write(f"is_dev={'true' if is_dev else 'false'}\n")
          print(
              f"[version-resolve] base={base_version} package={package_version} "
              f"use_dev_suffix={use_dev_suffix}"
          )
          PY

  build-wheels:
    name: Build wheels (${{ matrix.label }})
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.installers_only != 'true' }}
    needs:
      - resolve-package-version
    runs-on: ${{ matrix.runner }}
    env:
      JANUSX_REQUIRE_OPENBLAS: ${{ matrix.require_openblas }}
      JANUSX_MACOS_PREFER_ACCELERATE: ${{ matrix.prefer_accelerate }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # abi3 wheel (cp310-abi3) covers CPython 3.10+ on each platform/arch.
          - label: linux-x86_64
            runner: ubuntu-latest
            platform: linux
            python-version: "3.10"
            manylinux: "2014"
            manylinux_image: quay.io/pypa/manylinux2014_x86_64:latest
            interpreter: /opt/python/cp310-cp310/bin/python
            target: x86_64-unknown-linux-gnu
            require_openblas: "1"
            prefer_accelerate: "0"
            expected_backend: openblas
            upload_wheel: "true"
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
            platform: linux
            python-version: "3.10"
            manylinux: "2014"
            manylinux_image: quay.io/pypa/manylinux2014_aarch64:latest
            interpreter: /opt/python/cp310-cp310/bin/python
            target: aarch64-unknown-linux-gnu
            require_openblas: "1"
            prefer_accelerate: "0"
            expected_backend: openblas
            upload_wheel: "true"
          - label: macos-x86_64
            runner: macos-15-intel
            platform: macos
            python-version: "3.10"
            target: x86_64-apple-darwin
            blas_backend: openblas
            require_openblas: "1"
            prefer_accelerate: "0"
            expected_backend: openblas
            upload_wheel: "false"
          - label: macos-arm64
            runner: macos-14
            platform: macos
            python-version: "3.10"
            target: aarch64-apple-darwin
            blas_backend: openblas
            require_openblas: "1"
            prefer_accelerate: "0"
            expected_backend: openblas
            upload_wheel: "false"
          - label: macos-x86_64-accelerate
            runner: macos-15-intel
            platform: macos
            python-version: "3.10"
            target: x86_64-apple-darwin
            blas_backend: accelerate
            require_openblas: "0"
            prefer_accelerate: "1"
            expected_backend: accelerate
            upload_wheel: "true"
          - label: macos-arm64-accelerate
            runner: macos-14
            platform: macos
            python-version: "3.10"
            target: aarch64-apple-darwin
            blas_backend: accelerate
            require_openblas: "0"
            prefer_accelerate: "1"
            expected_backend: accelerate
            upload_wheel: "true"
          - label: windows-x86_64
            runner: windows-2025-vs2026
            platform: windows
            python-version: "3.10"
            target: x86_64-pc-windows-msvc
            require_openblas: "1"
            prefer_accelerate: "0"
            expected_backend: openblas
            upload_wheel: "true"
          # Build Windows ARM64 wheel via cross-target on windows-2025-vs2026.
          # If your org has native ARM runners, you can switch runner to windows-11-arm.
          - label: windows-arm64
            runner: windows-2025-vs2026
            platform: windows
            python-version: "3.10"
            target: aarch64-pc-windows-msvc
            require_openblas: "1"
            prefer_accelerate: "0"
            expected_backend: openblas
            upload_wheel: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Sync version for package build
        shell: bash
        run: |
          VERSION="${{ needs.resolve-package-version.outputs.package_version }}"
          if [[ -z "$VERSION" ]]; then
            echo "Skip sync_version_from_tag.py (non-tag ref)"
            exit 0
          fi
          echo "Using package version: $VERSION"
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          $PY scripts/sync_version_from_tag.py "$VERSION"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build tools
        if: ${{ matrix.platform != 'linux' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin==1.9.4 build "numpy>=1.23" "pybind11>=2.13" zstandard

      - name: Install OpenBLAS (macOS)
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        run: |
          brew update
          brew list --versions openblas >/dev/null 2>&1 || brew install openblas
          command -v pkg-config >/dev/null 2>&1 || brew install pkgconf
          OPENBLAS_PREFIX="$(brew --prefix openblas)"
          echo "OPENBLAS_LIB_DIR=${OPENBLAS_PREFIX}/lib" >> "$GITHUB_ENV"
          echo "OPENBLAS_INCLUDE_DIR=${OPENBLAS_PREFIX}/include" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${OPENBLAS_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Install OpenBLAS (Windows x86_64, conda-forge threaded)
        if: ${{ matrix.label == 'windows-x86_64' }}
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "condaforge-openblas-win64"
          python scripts/ci/install_windows_condaforge_openblas.py `
            --subdir win-64 `
            --flavor pthreads `
            --dest "$dest" `
            --github-env "$env:GITHUB_ENV" `
            --verbose

      - name: Install OpenBLAS (Windows ARM64 via vcpkg)
        if: ${{ matrix.label == 'windows-arm64' }}
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          git clone --depth=1 https://github.com/microsoft/vcpkg $vcpkgRoot
          & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics

          # Keep static-md for ARM64 cross-build; Rust side will detect static
          # layout and switch OpenBLAS extern linkage to kind=static.
          $triplet = "arm64-windows-static-md"

          & "$vcpkgRoot\vcpkg.exe" install "openblas[threads]:$triplet"
          if ($LASTEXITCODE -ne 0) {
            throw "vcpkg install openblas[threads] failed for triplet $triplet"
          }

          $installed = Join-Path $vcpkgRoot "installed\$triplet"
          $binDir = Join-Path $installed "bin"
          if (Test-Path $binDir) {
            "OPENBLAS_BIN_DIR=$binDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          "OPENBLAS_LIB_DIR=$installed\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENBLAS_INCLUDE_DIR=$installed\include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build wheels (Linux)
        if: ${{ matrix.platform == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ matrix.manylinux_image }}"
          TARGET="${{ matrix.target }}"
          INTERP="${{ matrix.interpreter }}"

          docker run --rm \
            -v "$PWD:/io" \
            -w /io \
            "$IMAGE" \
            bash -lc "
              set -euo pipefail
              yum install -y epel-release || true
              yum install -y gcc gcc-gfortran make pkgconfig curl tar gzip
              rm -rf dist dist_raw
              mkdir -p dist dist_raw
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
              source /root/.cargo/env
              export PATH=\"$(dirname ${INTERP}):\${PATH}\"
              ${INTERP} -m pip install -U pip
              ${INTERP} -m pip install maturin==1.9.4 build 'numpy>=1.23' 'pybind11>=2.13' auditwheel
              export OPENBLAS_VERSION=0.3.33
              . /io/scripts/ci/build_linux_openblas.sh
              export JANUSX_REQUIRE_OPENBLAS=1
              export JANUSX_STRICT_KMC_BIND=1
              ${INTERP} -m build --wheel --outdir dist_raw --no-isolation
              ${INTERP} /io/scripts/ci/check_wheel_kmc.py --exactly-one dist_raw/*.whl
              auditwheel show dist_raw/*.whl
              auditwheel repair dist_raw/*.whl -w dist
              ${INTERP} /io/scripts/ci/check_wheel_kmc.py --exactly-one dist/*.whl
              ${INTERP} -m pip install --force-reinstall --no-deps dist/*.whl
              CXX=/bin/false ${INTERP} /io/scripts/ci/check_installed_runtime.py \
                --require-openblas \
                --require-threaded-openblas \
                --check-kmc-load
            "

      - name: Build wheels (macOS/Windows)
        if: ${{ matrix.platform != 'linux' }}
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            export JANUSX_STRICT_KMC_BIND=1
            export JANUSX_BUNDLE_OPENBLAS_DYLIB=1
            export JANUSX_STRICT_OPENBLAS_BUNDLE=1
            python -m build --wheel --outdir dist --no-isolation
          elif [[ "${{ matrix.label }}" == "windows-x86_64" ]]; then
            export JANUSX_STRICT_KMC_BIND=1
            python -m build --wheel --outdir dist --no-isolation
          elif [[ "${{ matrix.label }}" == "windows-arm64" ]]; then
            # Cross-building Windows ARM64 from x64 host: avoid binding to host-arch Python import libs.
            export PYO3_CROSS=1
            export PYO3_CROSS_PYTHON_VERSION=3.10
            # Skip KMC prebuild on cross target; vendored pybind11 in KMC is not
            # Python 3.14 friendly and this path is not required for arm64 wheel sanity.
            export JANUSX_PREBUILD_KMC_BIND=0
            maturin build --release --out dist --target ${{ matrix.target }} --features blas-openblas
          else
            maturin build --release --out dist --target ${{ matrix.target }} --interpreter python --features blas-openblas
          fi

      - name: Probe SGEMM backend from built wheel
        if: ${{ matrix.label != 'windows-arm64' }}
        shell: bash
        run: |
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install --force-reinstall --no-deps dist/*.whl
          "$PY" - <<'PY'
          import janusx.janusx as _jx
          backend = _jx.rust_sgemm_backend()
          expected = "${{ matrix.expected_backend }}"
          print(f"[janusx] rust_sgemm_backend={backend}")
          if backend != expected:
              raise SystemExit(f"Strict mode failed: expected {expected!r} backend, got {backend!r}")
          PY

      - name: Verify bundled macOS dylib signature + load probe
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        run: |
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          "$PY" scripts/ci/check_installed_runtime.py --check-macos-bundled-openblas

      - name: Verify Rust eigh LAPACK backend (windows-x86_64)
        if: ${{ matrix.label == 'windows-x86_64' }}
        shell: bash
        run: |
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          "$PY" - <<'PY'
          import janusx.janusx as _jx
          # require_lapack=True must fail fast if LAPACK symbols/backends are unavailable.
          _ = _jx.rust_eigh_debug_f64(n=128, threads=4, driver="auto", jobz="V", require_lapack=True)
          print("[janusx] rust_eigh_debug_f64(require_lapack=True) passed")
          PY

      - name: Verify bundled OpenBLAS is threaded (windows-x86_64)
        if: ${{ matrix.label == 'windows-x86_64' }}
        shell: bash
        run: |
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          "$PY" scripts/ci/check_installed_runtime.py --require-openblas --require-threaded-openblas

      - name: Verify OpenBLAS threading (windows-x86_64)
        if: ${{ matrix.label == 'windows-x86_64' }}
        shell: bash
        run: |
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          "$PY" - <<'PY'
          import os
          import janusx.janusx as _jx

          target = 8
          for k in ("OPENBLAS_NUM_THREADS", "OMP_NUM_THREADS", "MKL_NUM_THREADS"):
              os.environ[k] = str(target)

          ok = bool(_jx.rust_blas_set_num_threads(target))
          got = int(_jx.rust_blas_get_num_threads())
          print(f"[janusx] rust_blas_set_num_threads({target}) -> {ok}")
          print(f"[janusx] rust_blas_get_num_threads() -> {got}")
          if not ok:
              raise SystemExit("Strict mode failed: rust_blas_set_num_threads returned False")
          if got < 2:
              raise SystemExit(
                  "Strict mode failed: OpenBLAS thread control ineffective "
                  f"(expected >=2, got {got})."
              )
          _ = _jx.rust_eigh_debug_f64(
              n=256,
              threads=target,
              driver="auto",
              jobz="V",
              require_lapack=True,
          )
          print("[janusx] OpenBLAS threading self-check passed")
          PY

      - name: Verify KMC prebuilt in wheel (all except windows-arm64)
        if: ${{ matrix.label != 'windows-arm64' }}
        shell: bash
        run: |
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install --force-reinstall --no-deps dist/*.whl
          "$PY" - <<'PY'
          import glob
          import zipfile

          wheels = sorted(glob.glob("dist/*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Strict mode failed: expected one wheel, got {len(wheels)}")
          wheel = wheels[0]
          with zipfile.ZipFile(wheel, "r") as zf:
              names = zf.namelist()
          kmc_entries = [
              n for n in names
              if n.startswith("janusx/_kmc_count")
              and (n.endswith(".so") or n.endswith(".pyd") or ".so." in n)
          ]
          print(f"[janusx] wheel={wheel}")
          print(f"[janusx] kmc_entries={kmc_entries}")
          if not kmc_entries:
              raise SystemExit("Strict mode failed: wheel does not include janusx/_kmc_count extension")
          PY
          "$PY" scripts/ci/check_installed_runtime.py --check-kmc-load

      - name: Wheel runtime smoke test (GWAS + rrBLUP)
        if: ${{ matrix.label == 'linux-x86_64' || matrix.label == 'macos-arm64-accelerate' }}
        shell: bash
        run: |
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          "$PY" -m pip install --upgrade pip
          # Install with dependencies to cover real runtime paths.
          "$PY" -m pip install --force-reinstall dist/*.whl
          JX_GGVAL_MODE=smoke \
          JX_GGVAL_THREADS=2 \
          JX_GGVAL_CV=2 \
          bash scripts/ggval.sh

      - name: Verify macOS wheel links OpenBLAS only
        if: ${{ matrix.platform == 'macos' && matrix.blas_backend == 'openblas' }}
        shell: bash
        run: |
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          EXT_PATH="$("$PY" - <<'PY'
          import janusx.janusx as _jx
          print(_jx.__file__)
          PY
          )"
          echo "[janusx] extension path: ${EXT_PATH}"
          otool -L "${EXT_PATH}"
          if ! otool -L "${EXT_PATH}" | grep -qi "libopenblas"; then
            echo "ERROR: Expected OpenBLAS linkage in macOS wheel."
            exit 1
          fi
          if otool -L "${EXT_PATH}" | grep -q "Accelerate.framework"; then
            echo "ERROR: Accelerate linkage detected in macOS wheel; expected OpenBLAS-only runtime path."
            exit 1
          fi

      - name: Verify macOS wheel links Accelerate only
        if: ${{ matrix.platform == 'macos' && matrix.blas_backend == 'accelerate' }}
        shell: bash
        run: |
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          EXT_PATH="$("$PY" - <<'PY'
          import janusx.janusx as _jx
          print(_jx.__file__)
          PY
          )"
          echo "[janusx] extension path: ${EXT_PATH}"
          otool -L "${EXT_PATH}"
          if ! otool -L "${EXT_PATH}" | grep -q "Accelerate.framework"; then
            echo "ERROR: Expected Accelerate linkage in macOS wheel."
            exit 1
          fi
          if otool -L "${EXT_PATH}" | grep -qi "libopenblas"; then
            echo "ERROR: OpenBLAS linkage detected in macOS Accelerate variant."
            exit 1
          fi

      - name: Accelerate GRM smoke test (macOS)
        if: ${{ matrix.platform == 'macos' && matrix.blas_backend == 'accelerate' }}
        shell: bash
        run: |
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install --force-reinstall dist/*.whl
          jx gformat -vcf example/mouse_hs1940.vcf.gz -fmt plink -o test
          jx grm -bfile test/mouse_hs1940 -o test
          "$PY" - <<'PY'
          import os
          import janusx.janusx as _jx
          bundled = os.environ.get("JX_OPENBLAS_LIB_PATH", "")
          print(f"[janusx] JX_OPENBLAS_LIB_PATH={bundled}")
          backend, evd_backend, *_ = _jx.rust_eigh_debug_f64(
              n=128,
              threads=2,
              driver="auto",
              jobz="V",
              require_lapack=True,
          )
          print(f"[janusx] rust_sgemm_backend={backend}")
          print(f"[janusx] rust_eigh_backend={evd_backend}")
          if backend != "accelerate":
              raise SystemExit(f"Strict mode failed: expected accelerate BLAS backend, got {backend!r}")
          if "openblas_dyn" not in evd_backend:
              raise SystemExit(
                  "Strict mode failed: expected macOS dynamic OpenBLAS LAPACK path "
                  f"(openblas_dyn), got {evd_backend!r}"
              )
          PY

      - name: Sanity check wheel artifact (windows-arm64 cross-build)
        if: ${{ matrix.label == 'windows-arm64' }}
        shell: bash
        run: |
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          "$PY" - <<'PY'
          import glob
          import os
          import zipfile

          wheels = glob.glob("dist/*.whl")
          print(f"[windows-arm64] built wheels: {wheels}")
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel, got {len(wheels)}")
          wheel = wheels[0]
          if "win_arm64" not in os.path.basename(wheel):
              raise SystemExit(f"Expected win_arm64 wheel, got {wheel}")
          with zipfile.ZipFile(wheel, "r") as zf:
              names = zf.namelist()
          if not any(name.endswith(".pyd") for name in names):
              raise SystemExit("No .pyd extension module found inside wheel")
          print("[windows-arm64] runtime probe skipped on x64 host; static wheel sanity check passed.")
          PY

      - name: Stage final wheel artifact
        if: ${{ matrix.upload_wheel == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf wheelhouse
          mkdir -p wheelhouse
          LABEL="${{ matrix.label }}"
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          if [[ "${LABEL}" != "windows-arm64" ]]; then
            "$PY" scripts/ci/check_wheel_kmc.py --exactly-one dist/*.whl
          else
            echo "[release] skip KMC prebuilt wheel check for ${LABEL} (cross-build path sets JANUSX_PREBUILD_KMC_BIND=0)"
          fi
          "$PY" - <<'PY'
          import glob
          import os
          import shutil

          wheels = sorted(glob.glob("dist/*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one final wheel in dist/, got {len(wheels)}")
          wheel = wheels[0]
          dst = os.path.join("wheelhouse", os.path.basename(wheel))
          shutil.copy2(wheel, dst)
          print(f"[release] staged final wheel: {dst}")
          PY

      - name: Upload final wheel artifact
        if: ${{ matrix.upload_wheel == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.label }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build sdist
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.installers_only != 'true' }}
    needs:
      - resolve-package-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Sync version for package build
        shell: bash
        run: |
          VERSION="${{ needs.resolve-package-version.outputs.package_version }}"
          if [[ -z "$VERSION" ]]; then
            echo "Skip sync_version_from_tag.py (non-tag ref)"
            exit 0
          fi
          echo "Using package version: $VERSION"
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          $PY scripts/sync_version_from_tag.py "$VERSION"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin==1.9.4

      - name: Build sdist
        run: |
          maturin sdist --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to TestPyPI
    if: ${{ (github.event_name != 'workflow_dispatch' || github.event.inputs.installers_only != 'true') && (github.event_name != 'workflow_dispatch' || github.event.inputs.publish_pypi != 'true') && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.inputs.ref, 'v') || startsWith(github.event.inputs.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    needs:
      - build-wheels
      - build-sdist
    permissions:
      contents: read
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: wheelhouse
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin==1.9.4

      - name: Publish to TestPyPI
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          if [[ -z "${MATURIN_PYPI_TOKEN:-}" ]]; then
            echo "Missing TEST_PYPI_API_TOKEN secret."
            exit 1
          fi
          maturin upload \
            --repository-url https://test.pypi.org/legacy/ \
            --non-interactive \
            --skip-existing \
            wheelhouse/*.whl dist/*.tar.gz

  publish-pypi:
    name: Publish to PyPI
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.installers_only != 'true' && github.event.inputs.publish_pypi == 'true' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.inputs.ref, 'v') || startsWith(github.event.inputs.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    needs:
      - build-wheels
      - build-sdist
    permissions:
      contents: read
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: wheelhouse
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin==1.9.4

      - name: Publish to PyPI
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [[ -z "${MATURIN_PYPI_TOKEN:-}" ]]; then
            echo "Missing PYPI_API_TOKEN secret."
            exit 1
          fi
          maturin upload \
            --non-interactive \
            --skip-existing \
            wheelhouse/*.whl dist/*.tar.gz

  update-bioconda-pr:
    name: Update Bioconda PR
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.installers_only != 'true' && github.event.inputs.publish_pypi == 'true' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.inputs.release_tag, 'v') || startsWith(github.event.inputs.ref, 'v') || startsWith(github.event.inputs.ref, 'refs/tags/v')) }}
    needs:
      - publish-pypi
    uses: ./.github/workflows/bioconda-pr-update.yml
    with:
      release_tag: ${{ github.event.inputs.release_tag || github.event.inputs.ref || github.ref_name }}
      source_ref: ${{ github.event.inputs.ref || github.ref }}
      bioconda_fork: FJingxian/bioconda-recipes
    secrets: inherit

  publish-installers:
    name: Publish launcher installers to GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-installers
    if: ${{ (github.event_name != 'workflow_dispatch' || github.event.inputs.publish_pypi != 'true') && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.inputs.release_tag, 'v') || startsWith(github.event.inputs.ref, 'v') || startsWith(github.event.inputs.ref, 'refs/tags/v')) }}
    permissions:
      contents: write
    steps:
      - name: Resolve installer release tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.release_tag || github.event.inputs.ref || github.ref_name }}"
          TAG="${TAG#refs/tags/}"
          if [[ -z "$TAG" || ! "$TAG" =~ ^v ]]; then
            echo "Invalid tag for release upload: '$TAG'"
            exit 1
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Fetch staged installer artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-installers
          merge-multiple: true

      - name: Restore Unix execute bits
        shell: bash
        run: |
          shopt -s nullglob
          for f in dist-installers/JanusX-*.command dist-installers/JanusX-*.run; do
            chmod +x "$f" || true
          done

      - name: Package installer archives
        shell: bash
        run: |
          shopt -s nullglob
          for f in dist-installers/JanusX-*; do
            [ -f "$f" ] || continue
            b="$(basename "$f")"
            stem="$b"
            stem="${stem%.command}"
            stem="${stem%.run}"
            stem="${stem%.exe}"
            out="dist-installers/${stem}.tar.gz"
            tar -czf "$out" -C dist-installers "$b"
          done
          find dist-installers -maxdepth 1 -type f -name 'JanusX-*' ! -name '*.tar.gz' -delete

      - name: Generate installer SHA256 sidecars
        shell: bash
        run: |
          shopt -s nullglob
          for f in dist-installers/JanusX-*.tar.gz; do
            b="$(basename "$f")"
            (
              cd dist-installers
              sha256sum "$b" > "${b}.sha256"
            )
          done

      - name: Publish installer archives and checksums
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist-installers/JanusX-*.tar.gz
            dist-installers/JanusX-*.tar.gz.sha256
          overwrite_files: true

  sync-version-back-to-repo:
    name: Sync Version Back To Repo
    if: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || github.event.inputs.installers_only != 'true') }}
    runs-on: ubuntu-latest
    needs:
      - publish
    permissions:
      contents: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Sync version and build date from tag
        shell: bash
        run: |
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          $PY scripts/sync_version_from_tag.py "${GITHUB_REF_NAME}"

      - name: Commit and push changes
        shell: bash
        run: |
          if git diff --quiet -- pyproject.toml Cargo.toml launcher/Cargo.toml python/janusx/script/JanusX.py bioconda-recipes/recipes/janusx/meta.yaml bioconda-recipes/recipes/janusx-localcheck/meta.yaml; then
            echo "No version/build-date changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml Cargo.toml launcher/Cargo.toml python/janusx/script/JanusX.py bioconda-recipes/recipes/janusx/meta.yaml bioconda-recipes/recipes/janusx-localcheck/meta.yaml
          git commit -m "chore(release): sync version from ${GITHUB_REF_NAME}"
          git pull --rebase origin "${{ github.event.repository.default_branch }}"
          git push origin HEAD:"${{ github.event.repository.default_branch }}"

  sync-version-back-to-repo-from-pypi:
    name: Sync Version Back To Repo (PyPI)
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.installers_only != 'true' && github.event.inputs.publish_pypi == 'true' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.inputs.release_tag, 'v') || startsWith(github.event.inputs.ref, 'v') || startsWith(github.event.inputs.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    needs:
      - publish-pypi
    permissions:
      contents: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Resolve sync tag
        shell: bash
        run: |
          SYNC_TAG="${{ github.event.inputs.release_tag || github.event.inputs.ref || github.ref_name }}"
          SYNC_TAG="${SYNC_TAG#refs/tags/}"
          if [[ -z "$SYNC_TAG" || ! "$SYNC_TAG" =~ ^v ]]; then
            echo "Invalid sync tag for PyPI publish: '$SYNC_TAG'"
            exit 1
          fi
          echo "SYNC_TAG=$SYNC_TAG" >> "$GITHUB_ENV"

      - name: Sync version and build date from tag
        shell: bash
        run: |
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          $PY scripts/sync_version_from_tag.py "${SYNC_TAG}"

      - name: Commit and push changes
        shell: bash
        run: |
          if git diff --quiet -- pyproject.toml Cargo.toml launcher/Cargo.toml python/janusx/script/JanusX.py bioconda-recipes/recipes/janusx/meta.yaml bioconda-recipes/recipes/janusx-localcheck/meta.yaml; then
            echo "No version/build-date changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml Cargo.toml launcher/Cargo.toml python/janusx/script/JanusX.py bioconda-recipes/recipes/janusx/meta.yaml bioconda-recipes/recipes/janusx-localcheck/meta.yaml
          git commit -m "chore(release): sync version from ${SYNC_TAG}"
          git pull --rebase origin "${{ github.event.repository.default_branch }}"
          git push origin HEAD:"${{ github.event.repository.default_branch }}"
