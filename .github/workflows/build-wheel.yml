name: Build Wheels Only

run-name: build-wheels/${{ github.event.inputs.target || 'all' }} @ ${{ github.event.inputs.ref || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag/sha/branch) to build from"
        required: false
        default: ""
        type: string
      target:
        description: "Target platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux-x86_64
          - linux-aarch64
          - macos-x86_64
          - macos-arm64
          - windows-x86_64
          - windows-arm64
      retention_days:
        description: "Artifact retention days"
        required: true
        default: "14"
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    name: Prepare wheel request
    runs-on: ubuntu-latest
    outputs:
      source_ref: ${{ steps.source.outputs.source_ref }}
      package_version: ${{ steps.version.outputs.package_version }}
    steps:
      - name: Resolve source ref
        id: source
        shell: bash
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
        run: |
          if [[ -n "${INPUT_REF}" ]]; then
            echo "source_ref=${INPUT_REF}" >> "$GITHUB_OUTPUT"
          else
            echo "source_ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve package version from tag
        id: version
        shell: bash
        env:
          RAW_REF: ${{ github.event.inputs.ref || github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re

          raw_ref = (os.environ.get("RAW_REF") or "").strip()
          ref = raw_ref
          if ref.startswith("refs/tags/"):
              ref = ref[len("refs/tags/") :]

          package_version = ""
          if ref.startswith("v"):
              base_version = ref[1:]
              if base_version == "":
                  raise SystemExit(f"Invalid empty version from ref: {raw_ref!r}")
              if not re.fullmatch(r"[0-9A-Za-z][0-9A-Za-z.\-+]*", base_version):
                  raise SystemExit(f"Unsupported version format from ref: {raw_ref!r}")
              package_version = base_version

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"package_version={package_version}\n")
          print(f"[build-wheel] package_version={package_version or '<repo-version>'}")
          PY

      - name: Write request summary
        shell: bash
        env:
          TARGET: ${{ github.event.inputs.target || 'all' }}
          RETENTION_DAYS: ${{ github.event.inputs.retention_days || '14' }}
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
          SOURCE_REF: ${{ steps.source.outputs.source_ref }}
        run: |
          if [[ -n "${PACKAGE_VERSION}" ]]; then
            VERSION_TEXT="${PACKAGE_VERSION}"
          else
            VERSION_TEXT="repo version"
          fi
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Wheel Build Request
          - Source ref: \`${SOURCE_REF}\`
          - Target: \`${TARGET}\`
          - Package version override: \`${VERSION_TEXT}\`
          - Artifact retention: \`${RETENTION_DAYS}\` days
          EOF

  build-wheels:
    name: Build selected wheels
    needs:
      - prepare
    uses: ./.github/workflows/reusable-wheel-build.yml
    with:
      source_ref: ${{ needs.prepare.outputs.source_ref }}
      package_version: ${{ needs.prepare.outputs.package_version }}
      matrix_preset: standard
      target: ${{ github.event.inputs.target || 'all' }}
      retention_days: ${{ github.event.inputs.retention_days }}
