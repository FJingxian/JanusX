{% set name = "janusx" %}
{% set version = "1.0.17" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/source/j/janusx/janusx-{{ version }}.tar.gz
  sha256: 77313e5c045cf7c364f0a91100b43515ffaeb19c510629cc1878b1765fa91abe
  md5: aa2f513c8790fe15e2e101f4b4213f89

build:
  number: 0
  skip: true  # [win or py<39]
  script_env:
    - JANUSX_NET_MODE
    - JANUSX_CARGO_REGISTRY
    - JANUSX_CARGO_REGISTRIES
    - JANUSX_CARGO_PROBE
    - JANUSX_CARGO_PROBE_TIMEOUT
    - CARGO_HTTP_TIMEOUT
    - CARGO_HTTP_LOW_SPEED_LIMIT
    - CARGO_HTTP_MULTIPLEXING
    - CARGO_NET_RETRY
    - HTTP_PROXY
    - HTTPS_PROXY
    - ALL_PROXY
    - NO_PROXY
    - http_proxy
    - https_proxy
    - all_proxy
    - no_proxy
  run_exports:
    - {{ pin_subpackage('janusx', max_pin='x') }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.7,<2
  run:
    - python
    - numpy
    - scipy
    - pandas <3.0
    - matplotlib-base
    - psutil
    - rich
    - tqdm
    - rich-argparse
    - joblib >=1.5

test:
  requires:
    - python
  commands:
    - jxpy -h
    - python -c "import janusx.janusx"
    - python -c "import janusx.script.JanusX as jx; assert callable(jx.main)"

about:
  home: https://github.com/FJingxian/JanusX
  summary: GWAS and genomic selection toolkit with Rust-accelerated kernels
  description: |
    JanusX is a high-performance toolkit for genome-wide association studies
    (GWAS), genomic selection (GS), and post-analysis visualization.

    This Bioconda recipe packages the Python+Rust core and provides the `jxpy`
    command entrypoint. Launcher-specific features (`jx`, self-update/runtime
    management, `fastq2vcf`, and `fastq2count`) are intentionally excluded
    from this package scope.

    This recipe focuses on the core runtime only. Optional third-party
    packages (for example scikit-learn, xgboost, statsmodels, pypardiso)
    should be installed by users on demand according to their workflow.

    Note:
      - The Python package `dynamicTreeCut` currently has no conda package in
        conda-forge/bioconda. For WGCNA module clustering support, install it
        with pip in the same environment.
  license: AGPL-3.0-or-later
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  doc_url: https://github.com/FJingxian/JanusX/tree/v{{ version }}/doc
  dev_url: https://github.com/FJingxian/JanusX

extra:
  identifiers:
    - doi:10.64898/2026.01.20.700366
  recipe-maintainers:
    - FJingxian
