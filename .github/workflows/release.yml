name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag/sha/branch) to build from"
        required: false
        default: ""
      release_tag:
        description: "GitHub Release tag to upload installers (e.g. v1.0.13)"
        required: false
        default: ""
      installers_only:
        description: "Only rebuild/upload release installers (skip wheels/sdist/PyPI)"
        required: false
        default: "false"

jobs:
  build-installers:
    name: Build launcher installers (${{ matrix.asset_suffix }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
            zig_target: x86_64-unknown-linux-gnu.2.17
            use_zigbuild: true
            asset_suffix: linux-x86_64
            ext: ""
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            rust_targets: aarch64-unknown-linux-gnu
            zig_target: aarch64-unknown-linux-gnu.2.17
            use_zigbuild: true
            asset_suffix: linux-aarch64
            ext: ""
          - runner: macos-14
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            use_zigbuild: false
            asset_suffix: darwin-universal
            ext: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            use_zigbuild: false
            asset_suffix: windows-x86_64
            ext: exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Sync version from tag
        shell: bash
        run: |
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          if [[ "$REF" == refs/tags/* ]]; then
            REF="${REF#refs/tags/}"
          fi
          if [[ ! "$REF" =~ ^v ]]; then
            echo "Skip sync_version_from_tag.py (non-tag ref: $REF)"
            exit 0
          fi
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          $PY scripts/sync_version_from_tag.py "$REF"

      - name: Set up Zig (Linux compatibility build)
        if: ${{ matrix.use_zigbuild }}
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: ${{ matrix.use_zigbuild }}
        shell: bash
        run: |
          cargo install cargo-zigbuild --locked

      - name: Build launcher
        shell: bash
        run: |
          if [[ "${{ matrix.use_zigbuild }}" == "true" ]]; then
            cargo zigbuild --release --manifest-path launcher/Cargo.toml --target "${{ matrix.zig_target }}"
          elif [[ "${{ matrix.asset_suffix }}" == "darwin-universal" ]]; then
            cargo build --release --manifest-path launcher/Cargo.toml --target aarch64-apple-darwin
            cargo build --release --manifest-path launcher/Cargo.toml --target x86_64-apple-darwin
            mkdir -p launcher/target/universal-apple-darwin/release
            lipo -create \
              launcher/target/aarch64-apple-darwin/release/jx \
              launcher/target/x86_64-apple-darwin/release/jx \
              -output launcher/target/universal-apple-darwin/release/jx
          else
            cargo build --release --manifest-path launcher/Cargo.toml --target "${{ matrix.target }}"
          fi

      - name: Package installer (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BUILD_TARGET="${{ matrix.target }}"
          if [[ "${{ matrix.use_zigbuild }}" == "true" ]]; then
            BUILD_TARGET="${{ matrix.zig_target }}"
          fi
          TAG="${{ github.event.inputs.release_tag || github.event.inputs.ref || github.ref_name }}"
          TAG="${TAG#refs/tags/}"
          if [ -z "$TAG" ]; then TAG="dev"; fi
          if [ -n "${{ matrix.ext }}" ]; then
            OUT="JanusX-${TAG}-${{ matrix.asset_suffix }}.${{ matrix.ext }}"
          else
            OUT="JanusX-${TAG}-${{ matrix.asset_suffix }}"
          fi
          BIN_PATH=""
          for c in \
            "launcher/target/${BUILD_TARGET}/release/jx" \
            "launcher/target/${{ matrix.target }}/release/jx"
          do
            if [[ -f "$c" ]]; then
              BIN_PATH="$c"
              break
            fi
          done
          if [[ -z "$BIN_PATH" ]]; then
            BIN_PATH="$(find launcher/target -type f -path '*/release/jx' | head -n 1 || true)"
          fi
          if [[ -z "$BIN_PATH" || ! -f "$BIN_PATH" ]]; then
            echo "Cannot find built launcher binary under launcher/target."
            find launcher/target -maxdepth 3 -type d -print || true
            exit 1
          fi
          cp "$BIN_PATH" "$OUT"
          chmod +x "$OUT"
          FILES="$OUT"
          if [[ "${{ matrix.target }}" == *"unknown-linux-gnu" ]]; then
            WRAP="${OUT}.run"
            {
              printf '%s\n' '#!/usr/bin/env bash'
              printf '%s\n' 'set -euo pipefail'
              printf '%s\n' 'SELF="$0"'
              printf '%s\n' 'TMPDIR="$(mktemp -d "${TMPDIR:-/tmp}/janusx-installer.XXXXXX")"'
              printf '%s\n' 'cleanup() { rm -rf "$TMPDIR"; }'
              printf '%s\n' 'trap cleanup EXIT'
              printf '%s\n' "PAYLOAD_LINE=\"\$(awk '/^__JANUSX_PAYLOAD_BELOW__\$/ {print NR + 1; exit 0;}' \"\$SELF\")\""
              printf '%s\n' 'if [[ -z "${PAYLOAD_LINE:-}" ]]; then'
              printf '%s\n' '  echo "Installer payload missing."'
              printf '%s\n' '  exit 1'
              printf '%s\n' 'fi'
              printf '%s\n' 'BIN="$TMPDIR/JanusX-installer"'
              printf '%s\n' 'tail -n +"$PAYLOAD_LINE" "$SELF" > "$BIN"'
              printf '%s\n' 'chmod +x "$BIN"'
              printf '%s\n' 'exec "$BIN" "$@"'
              printf '%s\n' 'exit 0'
              printf '%s\n' '__JANUSX_PAYLOAD_BELOW__'
            } > "$WRAP"
            cat "$OUT" >> "$WRAP"
            chmod +x "$WRAP"
            FILES="$WRAP"
          elif [[ "${{ matrix.target }}" == *"apple-darwin" ]]; then
            WRAP="${OUT}.command"
            {
              printf '%s\n' '#!/usr/bin/env bash'
              printf '%s\n' 'set -euo pipefail'
              printf '%s\n' 'SELF="$0"'
              printf '%s\n' 'TMPDIR="$(mktemp -d "${TMPDIR:-/tmp}/janusx-installer.XXXXXX")"'
              printf '%s\n' 'cleanup() { rm -rf "$TMPDIR"; }'
              printf '%s\n' 'trap cleanup EXIT'
              printf '%s\n' "PAYLOAD_LINE=\"\$(awk '/^__JANUSX_PAYLOAD_BELOW__\$/ {print NR + 1; exit 0;}' \"\$SELF\")\""
              printf '%s\n' 'if [[ -z "${PAYLOAD_LINE:-}" ]]; then'
              printf '%s\n' '  echo "Installer payload missing."'
              printf '%s\n' '  exit 1'
              printf '%s\n' 'fi'
              printf '%s\n' 'BIN="$TMPDIR/JanusX-installer"'
              printf '%s\n' 'tail -n +"$PAYLOAD_LINE" "$SELF" > "$BIN"'
              printf '%s\n' 'chmod +x "$BIN"'
              printf '%s\n' 'exec "$BIN" "$@"'
              printf '%s\n' 'exit 0'
              printf '%s\n' '__JANUSX_PAYLOAD_BELOW__'
            } > "$WRAP"
            cat "$OUT" >> "$WRAP"
            chmod +x "$WRAP"
            FILES="$WRAP"
          fi
          {
            echo "PACKAGED_FILE<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Package installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag || github.event.inputs.ref || github.ref_name }}"
          if ($tag.StartsWith("refs/tags/")) { $tag = $tag.Substring(10) }
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "dev" }
          $out = "JanusX-$tag-${{ matrix.asset_suffix }}.${{ matrix.ext }}"
          Copy-Item "launcher/target/${{ matrix.target }}/release/jx.exe" $out
          "PACKAGED_FILE=$out" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Optional sign installer (Windows Authenticode)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WIN_SIGN_CERT_PFX_BASE64: ${{ secrets.WIN_SIGN_CERT_PFX_BASE64 }}
          WIN_SIGN_CERT_PASSWORD: ${{ secrets.WIN_SIGN_CERT_PASSWORD }}
          WIN_SIGN_TIMESTAMP_URL: ${{ secrets.WIN_SIGN_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_SIGN_CERT_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:WIN_SIGN_CERT_PASSWORD)) {
            Write-Host "Skipping Windows signing: missing WIN_SIGN_CERT_PFX_BASE64 / WIN_SIGN_CERT_PASSWORD."
            exit 0
          }

          $certPath = Join-Path $env:RUNNER_TEMP "janusx-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WIN_SIGN_CERT_PFX_BASE64))

          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\**\x64\signtool.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $signtool) { throw "signtool.exe not found on runner." }

          $timestamp = if ([string]::IsNullOrWhiteSpace($env:WIN_SIGN_TIMESTAMP_URL)) { "http://timestamp.digicert.com" } else { $env:WIN_SIGN_TIMESTAMP_URL }
          & $signtool sign /fd SHA256 /f $certPath /p $env:WIN_SIGN_CERT_PASSWORD /tr $timestamp /td SHA256 $env:PACKAGED_FILE
          if ($LASTEXITCODE -ne 0) { throw "signtool sign failed with exit code $LASTEXITCODE." }

          & $signtool verify /pa /v $env:PACKAGED_FILE
          if ($LASTEXITCODE -ne 0) { throw "signtool verify failed with exit code $LASTEXITCODE." }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.asset_suffix }}
          path: ${{ env.PACKAGED_FILE }}

  build-wheels:
    name: Build wheels (${{ matrix.os }} / py${{ matrix.python-version }})
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.installers_only != 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Sync version from tag
        shell: bash
        run: |
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          if [[ "$REF" == refs/tags/* ]]; then
            REF="${REF#refs/tags/}"
          fi
          if [[ ! "$REF" =~ ^v ]]; then
            echo "Skip sync_version_from_tag.py (non-tag ref: $REF)"
            exit 0
          fi
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          $PY scripts/sync_version_from_tag.py "$REF"

      - name: Set up Python
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        if: runner.os != 'Linux'
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        if: runner.os != 'Linux'
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin==1.9.4

      - name: Set Python tag (Linux)
        if: runner.os == 'Linux'
        run: echo "PY_TAG=${PYTHON_VERSION/./}" >> $GITHUB_ENV
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter /opt/python/cp${{ env.PY_TAG }}-cp${{ env.PY_TAG }}/bin/python
          manylinux: ${{ (matrix.python-version == '3.13' || matrix.python-version == '3.14') && '2_28' || '2014' }}
          python-version: ${{ matrix.python-version }}

      - name: Build wheels (macOS/Windows)
        if: runner.os != 'Linux'
        run: |
          maturin build --release --out dist --interpreter python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  build-sdist:
    name: Build sdist
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.installers_only != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Sync version from tag
        shell: bash
        run: |
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          if [[ "$REF" == refs/tags/* ]]; then
            REF="${REF#refs/tags/}"
          fi
          if [[ ! "$REF" =~ ^v ]]; then
            echo "Skip sync_version_from_tag.py (non-tag ref: $REF)"
            exit 0
          fi
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          $PY scripts/sync_version_from_tag.py "$REF"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin==1.9.4

      - name: Build sdist
        run: |
          maturin sdist --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    if: ${{ (github.event_name != 'workflow_dispatch' || github.event.inputs.installers_only != 'true') && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.inputs.ref, 'v') || startsWith(github.event.inputs.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    needs:
      - build-wheels
      - build-sdist
    permissions:
      contents: read
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin==1.9.4

      - name: Publish to PyPI
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          maturin upload --non-interactive --skip-existing dist/*.whl dist/*.tar.gz

  update-bioconda-pr:
    name: Update Bioconda PR
    if: ${{ (github.event_name != 'workflow_dispatch' || github.event.inputs.installers_only != 'true') && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.inputs.ref, 'v') || startsWith(github.event.inputs.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    needs:
      - publish
    permissions:
      contents: read
    env:
      BIOCONDA_FORK: FJingxian/bioconda-recipes
      BIOCONDA_BRANCH: update-janusx
      BIOCONDA_PAT: ${{ secrets.BIOCONDA_PAT }}
    steps:
      - name: Check Bioconda token
        id: bioconda_gate
        shell: bash
        run: |
          if [[ -z "${BIOCONDA_PAT:-}" ]]; then
            echo "::warning::BIOCONDA_PAT secret is not set. Skipping Bioconda PR update."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release version
        if: ${{ steps.bioconda_gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          TAG="${{ github.event.inputs.ref || github.ref_name }}"
          TAG="${TAG#refs/tags/}"
          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Invalid tag for Bioconda update: '$TAG'"
            exit 1
          fi
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Wait for PyPI sdist
        if: ${{ steps.bioconda_gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          python - <<'PY'
          import os, time, urllib.request, sys
          version = os.environ["VERSION"]
          url = f"https://files.pythonhosted.org/packages/source/j/janusx/janusx-{version}.tar.gz"
          for _ in range(40):
              try:
                  with urllib.request.urlopen(url, timeout=20) as r:
                      if r.status == 200:
                          print("Found:", url)
                          sys.exit(0)
              except Exception:
                  pass
              time.sleep(15)
          raise SystemExit("PyPI sdist not available yet")
          PY

      - name: Compute sdist hashes
        if: ${{ steps.bioconda_gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          python - <<'PY'
          import os, urllib.request, hashlib
          version = os.environ["VERSION"]
          url = f"https://files.pythonhosted.org/packages/source/j/janusx/janusx-{version}.tar.gz"
          data = urllib.request.urlopen(url, timeout=60).read()
          sha = hashlib.sha256(data).hexdigest()
          md5 = hashlib.md5(data).hexdigest()
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as f:
              f.write(f"sha256={sha}\n")
              f.write(f"md5={md5}\n")
          PY
        id: sdist_hash

      - name: Checkout bioconda fork
        if: ${{ steps.bioconda_gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          git clone "https://x-access-token:${BIOCONDA_PAT}@github.com/${BIOCONDA_FORK}.git" bioconda-recipes
          cd bioconda-recipes
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin --depth=1 || true
          if git show-ref --verify --quiet "refs/remotes/origin/${BIOCONDA_BRANCH}"; then
            git checkout -B "${BIOCONDA_BRANCH}" "origin/${BIOCONDA_BRANCH}"
          elif git show-ref --verify --quiet refs/remotes/origin/master; then
            git checkout -B "${BIOCONDA_BRANCH}" origin/master
          elif git show-ref --verify --quiet refs/remotes/origin/main; then
            git checkout -B "${BIOCONDA_BRANCH}" origin/main
          else
            git checkout -B "${BIOCONDA_BRANCH}"
          fi

      - name: Update recipe
        if: ${{ steps.bioconda_gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from textwrap import dedent

          version = os.environ["VERSION"]
          sha = os.environ["SHA256"]
          path = Path("bioconda-recipes/recipes/janusx/meta.yaml")
          path.parent.mkdir(parents=True, exist_ok=True)

          text = dedent(f"""\
          {{% set version = "{version}" %}}

          package:
            name: janusx
            version: {{{{ version }}}}

          source:
            url: https://files.pythonhosted.org/packages/source/j/janusx/janusx-{{{{ version }}}}.tar.gz
            sha256: {sha}

          build:
            number: 0
            run_exports:
              - {{{{ pin_subpackage('janusx', max_pin='x') }}}}
            script: "{{{{ PYTHON }}}} -m pip install . -vv --no-deps"

          requirements:
            host:
              - python
              - pip
              - maturin >=1.7,<2
              - setuptools
              - {{{{ compiler('rust') }}}}
            run:
              - python >=3.9
              - numpy
              - scipy
              - pandas <3.0
              - matplotlib-base
              - psutil
              - rich
              - tqdm
              - rich-argparse
              - joblib >=1.5

          test:
            imports:
              - janusx
            commands:
              - jxpy -h

          about:
            home: https://github.com/FJingxian/JanusX
            summary: A suite of genotyping tools for genome-wide association study and genomic selection
            license: MIT
            license_file: LICENSE

          extra:
            recipe-maintainers:
              - FJingxian
          """)

          path.write_text(text, encoding="utf-8")
          PY
        env:
          SHA256: ${{ steps.sdist_hash.outputs.sha256 }}

      - name: Commit and push
        if: ${{ steps.bioconda_gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          cd bioconda-recipes
          git add recipes/janusx/meta.yaml
          git commit -m "Update janusx to ${VERSION}" || {
            echo "No changes to commit."
            exit 0
          }
          git push origin "${BIOCONDA_BRANCH}" --force-with-lease

      - name: Create or update PR
        if: ${{ steps.bioconda_gate.outputs.enabled == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.BIOCONDA_PAT }}
        run: |
          OWNER="${BIOCONDA_FORK%%/*}"
          pr=$(gh pr list --repo bioconda/bioconda-recipes --head "${OWNER}:${BIOCONDA_BRANCH}" --state open --json number -q '.[0].number')
          if [[ -z "${pr}" ]]; then
            gh pr create \
              --repo bioconda/bioconda-recipes \
              --head "${OWNER}:${BIOCONDA_BRANCH}" \
              --base master \
              --title "Update janusx to ${VERSION}" \
              --body "Automated update from JanusX release workflow."
          else
            gh pr comment \
              --repo bioconda/bioconda-recipes \
              --body "Updated janusx to ${VERSION} via automated release workflow." \
              "${pr}"
          fi

  publish-installers:
    name: Publish launcher installers to GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-installers
    if: ${{ startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.inputs.release_tag, 'v') || startsWith(github.event.inputs.ref, 'v') || startsWith(github.event.inputs.ref, 'refs/tags/v') }}
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.release_tag || github.event.inputs.ref || github.ref_name }}"
          TAG="${TAG#refs/tags/}"
          if [[ -z "$TAG" || ! "$TAG" =~ ^v ]]; then
            echo "Invalid tag for release upload: '$TAG'"
            exit 1
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-installers
          merge-multiple: true

      - name: Restore executable permissions for Unix installers
        shell: bash
        run: |
          shopt -s nullglob
          for f in dist-installers/JanusX-*.command dist-installers/JanusX-*.run; do
            chmod +x "$f" || true
          done

      - name: Repackage installers as tar.gz
        shell: bash
        run: |
          shopt -s nullglob
          for f in dist-installers/JanusX-*; do
            [ -f "$f" ] || continue
            b="$(basename "$f")"
            stem="$b"
            stem="${stem%.command}"
            stem="${stem%.run}"
            stem="${stem%.exe}"
            out="dist-installers/${stem}.tar.gz"
            tar -czf "$out" -C dist-installers "$b"
          done
          find dist-installers -maxdepth 1 -type f -name 'JanusX-*' ! -name '*.tar.gz' -delete

      - name: Upload installers to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist-installers/JanusX-*.tar.gz
          overwrite_files: true

  sync-version-back-to-repo:
    name: Sync Version Back To Repo
    if: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || github.event.inputs.installers_only != 'true') }}
    runs-on: ubuntu-latest
    needs:
      - publish
    permissions:
      contents: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Sync version and build date from tag
        shell: bash
        run: |
          PY=python
          command -v python >/dev/null 2>&1 || PY=python3
          $PY scripts/sync_version_from_tag.py "${GITHUB_REF_NAME}"

      - name: Commit and push changes
        shell: bash
        run: |
          if git diff --quiet -- pyproject.toml Cargo.toml launcher/Cargo.toml python/janusx/script/JanusX.py; then
            echo "No version/build-date changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml Cargo.toml launcher/Cargo.toml python/janusx/script/JanusX.py
          git commit -m "chore(release): sync version from ${GITHUB_REF_NAME}"
          git pull --rebase origin "${{ github.event.repository.default_branch }}"
          git push origin HEAD:"${{ github.event.repository.default_branch }}"
